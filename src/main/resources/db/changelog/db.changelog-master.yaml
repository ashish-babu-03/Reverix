databaseChangeLog:
  - changeSet:
      id: 001-create-users
      author: Ashish Babu
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: VARCHAR(15)
              - column:
                  name: role
                  type: ENUM('USER','PRIME_USER','ADMIN')
                  defaultValue: USER
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 002-create-theatres
      author: Ashish Babu
      changes:
        - createTable:
            tableName: theatres
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: city
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: vibe_type
                  type: ENUM('CELEBRATION','SILENT','FAMILY','DATE_NIGHT','PREMIERE')
                  constraints:
                    nullable: false
              - column:
                  name: screen_size
                  type: ENUM('STANDARD','LARGE','IMAX','DRIVE_IN')
                  defaultValue: STANDARD
              - column:
                  name: avg_rating
                  type: DECIMAL(3,2)
                  defaultValueNumeric: 0.00
              - column:
                  name: total_reviews
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 003-create-movies
      author: Ashish Babu
      changes:
        - createTable:
            tableName: movies
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tmdb_id
                  type: VARCHAR(50)
                  constraints:
                    unique: true
              - column:
                  name: title
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: genre
                  type: VARCHAR(200)
              - column:
                  name: language
                  type: VARCHAR(50)
              - column:
                  name: mood_tags
                  type: VARCHAR(255)
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: poster_url
                  type: VARCHAR(500)
              - column:
                  name: rating
                  type: DECIMAL(3,1)
              - column:
                  name: release_date
                  type: DATE
              - column:
                  name: is_rentable
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: rent_price
                  type: DECIMAL(8,2)

  - changeSet:
      id: 004-create-shows
      author: Ashish Babu
      changes:
        - createTable:
            tableName: shows
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: movie_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_show_movie
                    references: movies(id)
              - column:
                  name: theatre_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_show_theatre
                    references: theatres(id)
              - column:
                  name: show_time
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: total_seats
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: available_seats
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DECIMAL(8,2)
                  constraints:
                    nullable: false
              - column:
                  name: is_prime_early_access
                  type: BOOLEAN
                  defaultValueBoolean: false

  - changeSet:
      id: 005-create-seats
      author: Ashish Babu
      changes:
        - createTable:
            tableName: seats
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: show_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_seat_show
                    references: shows(id)
              - column:
                  name: seat_number
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: zone
                  type: ENUM('FRONT','MIDDLE','BACK')
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: ENUM('AVAILABLE','LOCKED','BOOKED')
                  defaultValue: AVAILABLE
              - column:
                  name: locked_by_user_id
                  type: BIGINT
              - column:
                  name: locked_until
                  type: DATETIME

  - changeSet:
      id: 006-create-bookings
      author: Ashish Babu
      changes:
        - createTable:
            tableName: bookings
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_booking_user
                    references: users(id)
              - column:
                  name: show_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_booking_show
                    references: shows(id)
              - column:
                  name: seat_ids
                  type: VARCHAR(255)
              - column:
                  name: total_amount
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: ENUM('PENDING','CONFIRMED','CANCELLED')
                  defaultValue: PENDING
              - column:
                  name: is_prime_booking
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: booked_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP