spring.application.name=reverix
spring.datasource.url=jdbc:mysql://localhost:3306/reverix_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true


spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

server.port=8080

app.jwt.secret=longDummySecret
app.jwt.expiration=86400000

# TMDb API
tmdb.api.key=dummyKey
tmdb.api.base-url=https://api.themoviedb.org/3
tmdb.image.base-url=https://image.tmdb.org/t/p/w500

openrouter.api.key=dummyKey
openrouter.api.url=https://openrouter.ai/api/v1/chat/completions
openrouter.model=openrouter/auto